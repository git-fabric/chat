<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#F5F0E8">
    <title>Cortex Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Light Theme (Default - Claude iOS inspired) */
            --bg-primary: #F5F0E8;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #EEEBE4;
            --bg-input: #FFFFFF;
            --text-primary: #1A1A1A;
            --text-secondary: #6B6B6B;
            --text-tertiary: #9B9B9B;
            --border-subtle: #E0DDD5;
            --border-medium: #D0CDC5;
            --accent-orange: #D97757;
            --accent-blue: #5B8FD9;
            --accent-green: #4CAF50;
            --error-red: #D9695F;
            --shadow-light: rgba(0, 0, 0, 0.05);
            --shadow-medium: rgba(0, 0, 0, 0.1);
            --shadow-heavy: rgba(0, 0, 0, 0.15);
            --header-height: 60px;
            --sidebar-width: 280px;
        }

        /* Dark Theme */
        [data-theme="dark"] {
            --bg-primary: #1A1A1A;
            --bg-secondary: #2D2D2D;
            --bg-tertiary: #3A3A3A;
            --bg-input: #2D2D2D;
            --text-primary: #EEEEEE;
            --text-secondary: #B0B0B0;
            --text-tertiary: #7A7A7A;
            --border-subtle: #3A3A3A;
            --border-medium: #4A4A4A;
            --accent-orange: #E08060;
            --accent-blue: #6B9FE9;
            --accent-green: #5CBF60;
            --error-red: #E9796F;
            --shadow-light: rgba(0, 0, 0, 0.2);
            --shadow-medium: rgba(0, 0, 0, 0.3);
            --shadow-heavy: rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* App Container */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .app-header {
            height: var(--header-height);
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 17px;
            color: var(--text-primary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hamburger-btn, .theme-toggle-btn, .profile-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 18px;
            transition: background 0.15s;
        }

        .hamburger-btn:hover, .theme-toggle-btn:hover, .profile-btn:hover {
            background: var(--bg-tertiary);
        }

        .profile-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent-orange);
            color: white;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        /* Content Wrapper */
        .content-wrapper {
            display: flex;
            flex: 1;
            margin-top: var(--header-height);
            height: calc(100vh - var(--header-height));
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.3s ease;
            flex-shrink: 0;
            z-index: 90;
        }

        .new-chat-btn {
            margin: 16px;
            padding: 12px 16px;
            background: var(--accent-orange);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.15s;
        }

        .new-chat-btn:hover { opacity: 0.9; }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 16px;
        }

        .sidebar-section { margin-bottom: 8px; }

        .sidebar-section-header {
            padding: 8px 20px 4px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.8px;
            color: var(--text-tertiary);
        }

        .section-header {
            cursor: pointer;
            user-select: none;
        }

        .conversation-list {
            transition: all 0.2s ease;
            overflow: hidden;
        }

        .conversation-list.collapsed { display: none; }

        .chat-item {
            display: flex;
            align-items: center;
            border-radius: 8px;
            margin-bottom: 2px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .chat-item:hover, .chat-item.active {
            background: var(--bg-tertiary);
        }

        .chat-item-content {
            flex: 1;
            padding: 10px 12px;
            min-width: 0;
        }

        .chat-item-title {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }

        .chat-item-time {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        .delete-chat-btn {
            background: none;
            border: none;
            color: var(--text-tertiary);
            font-size: 18px;
            padding: 8px;
            cursor: pointer;
            border-radius: 6px;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s;
        }

        .chat-item:hover .delete-chat-btn { opacity: 1; }
        .delete-chat-btn:hover { color: var(--error-red); }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border-subtle);
        }

        .badge {
            background: rgba(217, 119, 87, 0.15);
            color: var(--accent-orange);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 24px 140px;
            display: flex;
            flex-direction: column;
        }

        /* Empty State */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 48px 24px;
        }

        .empty-state.hidden { display: none; }

        .logo-container {
            width: 80px;
            height: 80px;
            background: var(--bg-secondary);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 24px var(--shadow-medium);
        }

        .logo-svg {
            width: 48px;
            height: 48px;
        }

        .welcome-text {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            text-align: center;
        }

        /* Messages */
        .messages-container {
            display: none;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            max-width: 85%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--accent-orange);
            color: white;
        }

        .message.assistant .message-avatar {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            max-width: 100%;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: var(--accent-orange);
            color: white;
            border-radius: 16px 16px 4px 16px;
        }

        .message.assistant .message-bubble {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
            border-radius: 16px 16px 16px 4px;
        }

        /* Thinking Indicator */
        .thinking-indicator {
            display: none;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 16px 16px 16px 4px;
            width: fit-content;
            margin-top: 8px;
        }

        .thinking-indicator .dot {
            width: 8px;
            height: 8px;
            background: var(--text-tertiary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .thinking-indicator .dot:nth-child(1) { animation-delay: -0.32s; }
        .thinking-indicator .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Input Area */
        .input-area {
            position: fixed;
            bottom: 0;
            left: var(--sidebar-width);
            right: 0;
            padding: 16px 24px 24px;
            background: linear-gradient(to bottom, transparent, var(--bg-primary) 40%);
        }

        .input-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-input);
            border: 1px solid var(--border-medium);
            border-radius: 16px;
            padding: 8px 8px 8px 16px;
            box-shadow: 0 2px 16px var(--shadow-light);
        }

        .input-field {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 15px;
            color: var(--text-primary);
            font-family: inherit;
        }

        .input-field::placeholder { color: var(--text-tertiary); }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: var(--accent-orange);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.15s;
        }

        .send-btn:disabled { opacity: 0.4; cursor: default; }
        .send-btn:not(:disabled):hover { opacity: 0.85; }

        /* Error banner */
        .error-banner {
            background: rgba(217, 105, 95, 0.1);
            border: 1px solid var(--error-red);
            color: var(--error-red);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin: 8px 24px;
            display: none;
        }

        .error-banner.show { display: block; }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -100%;
                top: var(--header-height);
                height: calc(100vh - var(--header-height));
                box-shadow: 4px 0 24px var(--shadow-heavy);
            }

            .sidebar.open { left: 0; }

            .sidebar-overlay {
                position: fixed;
                top: var(--header-height);
                left: 0;
                width: 100%;
                height: calc(100vh - var(--header-height));
                background: rgba(0, 0, 0, 0.5);
                z-index: 80;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.3s;
            }

            .sidebar-overlay.show {
                opacity: 1;
                pointer-events: all;
            }

            .input-area {
                left: 0;
                padding: 12px 16px 20px;
            }

            .chat-messages { padding: 16px 12px 140px; }
            .message { max-width: 95%; }
        }

        @media (min-width: 769px) {
            .sidebar-overlay { display: none; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

        /* Code blocks */
        pre {
            background: var(--bg-tertiary);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
        }

        code {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-primary);
        }

        /* Collapsible sections */
        .conversations-section { margin-bottom: 4px; }

        /* Tables */
        .message-bubble table {
            border-collapse: collapse;
            width: 100%;
            margin: 8px 0;
            font-size: 13px;
        }

        .message-bubble th,
        .message-bubble td {
            padding: 6px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-subtle);
        }

        .message-bubble th {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            border-bottom: 2px solid var(--border-medium);
        }

        .message-bubble tr:last-child td { border-bottom: none; }

        /* Lists */
        .message-bubble ul {
            margin: 6px 0;
            padding-left: 20px;
        }

        .message-bubble li { margin: 3px 0; }

        /* Headings inside bubbles */
        .message-bubble h1,
        .message-bubble h2,
        .message-bubble h3 {
            margin: 10px 0 4px;
            font-weight: 600;
            line-height: 1.3;
        }

        .message-bubble h1 { font-size: 17px; }
        .message-bubble h2 { font-size: 15px; }
        .message-bubble h3 { font-size: 13px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <!-- Main App -->
    <div class="app-container" id="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle sidebar">☰</button>
                <div class="header-logo">
                    <svg width="24" height="24" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="8" fill="currentColor"/>
                        <g transform="translate(50,50)">
                            <ellipse rx="3" ry="18" fill="currentColor" transform="rotate(0)"/>
                            <ellipse rx="3" ry="18" fill="currentColor" transform="rotate(45)"/>
                            <ellipse rx="3" ry="18" fill="currentColor" transform="rotate(90)"/>
                            <ellipse rx="3" ry="18" fill="currentColor" transform="rotate(135)"/>
                        </g>
                    </svg>
                    <span>Cortex</span>
                </div>
            </div>
            <div class="header-right">
                <button class="theme-toggle-btn" id="themeToggle" aria-label="Toggle theme">
                    <span id="themeIcon">☀️</span>
                </button>
            </div>
        </header>

        <!-- Content Wrapper -->
        <div class="content-wrapper">
            <!-- Sidebar Overlay for Mobile -->
            <div class="sidebar-overlay" id="sidebarOverlay"></div>

            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <button class="new-chat-btn" id="newChatBtn">
                    <span>+</span>
                    <span>New Chat</span>
                </button>

                <nav class="sidebar-nav">
                    <div class="sidebar-section">
                        <div class="sidebar-section-header">CHATS</div>

                        <div class="conversations-section">
                            <div class="section-header" onclick="toggleConversationSection('active')"
                                 style="padding: 8px 20px; display: flex; align-items: center; justify-content: space-between;">
                                <span style="font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: var(--text-tertiary);">ACTIVE</span>
                            </div>
                            <div id="active-conversations" class="conversation-list" style="padding: 4px 8px;">
                                <div style="padding: 16px; color: var(--text-tertiary); text-align: center; font-size: 12px;">No active chats</div>
                            </div>
                        </div>

                        <div class="conversations-section">
                            <div class="section-header" onclick="toggleConversationSection('archived')"
                                 style="padding: 8px 20px; display: flex; align-items: center; justify-content: space-between;">
                                <span style="font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: var(--text-tertiary);">ARCHIVED</span>
                                <span class="badge" id="archived-count" style="display: none;">0</span>
                            </div>
                            <div id="archived-conversations" class="conversation-list collapsed" style="padding: 4px 8px;">
                                <div style="padding: 16px; color: var(--text-tertiary); text-align: center; font-size: 12px;">No archived chats</div>
                            </div>
                        </div>
                    </div>
                </nav>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <div id="errorBanner" class="error-banner"></div>

                <div class="chat-messages" id="chatMessages">
                    <!-- Empty State -->
                    <div class="empty-state" id="emptyState">
                        <div class="logo-container">
                            <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="50" cy="50" r="8" fill="#d97757"/>
                                <g transform="translate(50,50)">
                                    <ellipse rx="3" ry="18" fill="#d97757" transform="rotate(0)"/>
                                    <ellipse rx="3" ry="18" fill="#d97757" transform="rotate(45)"/>
                                    <ellipse rx="3" ry="18" fill="#d97757" transform="rotate(90)"/>
                                    <ellipse rx="3" ry="18" fill="#d97757" transform="rotate(135)"/>
                                </g>
                            </svg>
                        </div>
                        <div class="welcome-text" id="welcomeText">How can I help you today?</div>
                    </div>

                    <!-- Messages Container -->
                    <div class="messages-container" id="messagesContainer" style="display: none;"></div>

                    <!-- Thinking Indicator -->
                    <div id="thinking-indicator" class="thinking-indicator" style="display: none;">
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-area">
                    <div class="input-container">
                        <input type="text" class="input-field" id="messageInput" placeholder="Message Cortex..." autocomplete="off">
                        <button class="send-btn" id="sendBtn" disabled aria-label="Send message">↑</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // ── Configuration ─────────────────────────────────────────────────────────
        const GATEWAY_URL = 'https://gateway.ry-ops.dev';
        const STORAGE_KEY_CONV = 'cortex_current_conversation';
        const STORAGE_KEY_THEME = 'cortex_theme';

        const WELCOME_MESSAGES = [
            "How can I help you today?",
            "What would you like to know?",
            "Ready to help with your infrastructure",
            "Ask me about your systems"
        ];

        // ── State ─────────────────────────────────────────────────────────────────
        let currentSessionId = null;
        let isBusy = false;

        // ── Gateway MCP client ────────────────────────────────────────────────────
        async function callTool(name, args) {
            const body = JSON.stringify({
                jsonrpc: '2.0',
                id: 1,
                method: 'tools/call',
                params: { name, arguments: args }
            });

            const res = await fetch(`${GATEWAY_URL}/mcp`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json, text/event-stream'
                },
                body
            });

            if (!res.ok) {
                throw new Error(`Gateway error ${res.status}: ${await res.text()}`);
            }

            const text = await res.text();

            // Gateway responds in SSE format: "data: {...}\n\n"
            for (const line of text.split('\n')) {
                if (!line.startsWith('data: ')) continue;
                const payload = JSON.parse(line.slice(6));
                if (payload.error) throw new Error(payload.error.message ?? JSON.stringify(payload.error));
                if (payload.result?.content?.[0]?.text) {
                    return JSON.parse(payload.result.content[0].text);
                }
            }

            throw new Error('No data in gateway response');
        }

        // ── DOM refs ──────────────────────────────────────────────────────────────
        const hamburgerBtn   = document.getElementById('hamburgerBtn');
        const sidebar        = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const emptyState     = document.getElementById('emptyState');
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput   = document.getElementById('messageInput');
        const sendBtn        = document.getElementById('sendBtn');
        const newChatBtn     = document.getElementById('newChatBtn');
        const themeToggle    = document.getElementById('themeToggle');
        const themeIcon      = document.getElementById('themeIcon');
        const errorBanner    = document.getElementById('errorBanner');

        // ── Init ──────────────────────────────────────────────────────────────────
        function init() {
            loadTheme();
            document.getElementById('welcomeText').textContent =
                WELCOME_MESSAGES[Math.floor(Math.random() * WELCOME_MESSAGES.length)];
            setupEventListeners();
            loadConversations();

            const saved = localStorage.getItem(STORAGE_KEY_CONV);
            // Only restore if it's a valid UUID (Qdrant requires UUIDs)
            const isUuid = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
            if (saved && isUuid.test(saved)) {
                currentSessionId = saved;
                loadConversation(saved);
            } else if (saved) {
                localStorage.removeItem(STORAGE_KEY_CONV);
            }
        }

        // ── Theme ─────────────────────────────────────────────────────────────────
        function loadTheme() {
            const theme = localStorage.getItem(STORAGE_KEY_THEME) || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            updateThemeIcon(theme);
        }

        function toggleTheme() {
            const cur = document.documentElement.getAttribute('data-theme');
            const next = cur === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem(STORAGE_KEY_THEME, next);
            updateThemeIcon(next);
        }

        function updateThemeIcon(theme) {
            themeIcon.textContent = theme === 'light' ? '☀️' : '🌙';
        }

        // ── Sidebar ───────────────────────────────────────────────────────────────
        function toggleSidebar() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('show');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('show');
        }

        function toggleConversationSection(id) {
            document.getElementById(`${id}-conversations`)?.classList.toggle('collapsed');
        }

        // ── Event listeners ───────────────────────────────────────────────────────
        function setupEventListeners() {
            hamburgerBtn.addEventListener('click', toggleSidebar);
            sidebarOverlay.addEventListener('click', closeSidebar);
            themeToggle.addEventListener('click', toggleTheme);
            newChatBtn.addEventListener('click', startNewChat);

            messageInput.addEventListener('input', () => {
                sendBtn.disabled = !messageInput.value.trim() || isBusy;
            });

            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            sendBtn.addEventListener('click', sendMessage);

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && sidebar.classList.contains('open')) closeSidebar();
            });
        }

        // ── Session list ──────────────────────────────────────────────────────────
        async function loadConversations() {
            const activeList = document.getElementById('active-conversations');
            activeList.innerHTML = '<div style="padding: 16px; color: var(--text-tertiary); text-align: center; font-size: 12px;">Loading...</div>';

            try {
                const [active, archived] = await Promise.all([
                    callTool('chat_session_list', { state: 'active', limit: 50 }),
                    callTool('chat_session_list', { state: 'archived', limit: 50 })
                ]);

                renderConversationList('active', active.sessions ?? []);
                renderConversationList('archived', archived.sessions ?? []);
                updateBadge('archived-count', (archived.sessions ?? []).length);
            } catch (err) {
                console.error('loadConversations:', err);
                activeList.innerHTML = '<div style="padding: 16px; color: var(--error-red); text-align: center; font-size: 12px;">Failed to load</div>';
            }
        }

        function renderConversationList(category, sessions) {
            const el = document.getElementById(`${category}-conversations`);
            if (!el) return;
            el.innerHTML = '';

            if (!sessions.length) {
                const labels = { active: 'No active chats', archived: 'No archived chats' };
                el.innerHTML = `<div style="padding: 16px; color: var(--text-tertiary); text-align: center; font-size: 12px;">${labels[category] ?? 'No chats'}</div>`;
                return;
            }

            sessions.forEach(session => {
                const item = document.createElement('div');
                item.className = 'chat-item';
                if (session.sessionId === currentSessionId) item.classList.add('active');

                const content = document.createElement('div');
                content.className = 'chat-item-content';

                const title = document.createElement('div');
                title.className = 'chat-item-title';
                title.textContent = session.title || `Chat ${formatTime(session.createdAt)}`;

                const time = document.createElement('div');
                time.className = 'chat-item-time';
                time.textContent = formatTime(session.updatedAt);

                content.appendChild(title);
                content.appendChild(time);

                const delBtn = document.createElement('button');
                delBtn.className = 'delete-chat-btn';
                delBtn.innerHTML = '×';
                delBtn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    await deleteConversation(session.sessionId);
                });

                content.addEventListener('click', async () => {
                    currentSessionId = session.sessionId;
                    localStorage.setItem(STORAGE_KEY_CONV, session.sessionId);
                    await loadConversation(session.sessionId);
                    closeSidebar();
                    await loadConversations();
                });

                item.appendChild(content);
                item.appendChild(delBtn);
                el.appendChild(item);
            });
        }

        function updateBadge(id, count) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = count;
            el.style.display = count > 0 ? 'inline-block' : 'none';
        }

        // ── Load a conversation ───────────────────────────────────────────────────
        async function loadConversation(sessionId) {
            if (isBusy) return;
            try {
                const data = await callTool('chat_session_get', { sessionId });
                const session = data.session ?? data;
                if (!session) return;

                emptyState.classList.add('hidden');
                messagesContainer.style.display = 'flex';
                messagesContainer.innerHTML = '';

                const messages = session.messages ?? [];
                messages.forEach(msg => {
                    if (msg.role === 'user' || msg.role === 'assistant') {
                        appendMessage(msg.role, msg.content, false);
                    }
                });

                scrollToBottom();
            } catch (err) {
                console.error('loadConversation:', err);
                showError(`Failed to load conversation: ${err.message}`);
            }
        }

        // ── Delete ────────────────────────────────────────────────────────────────
        async function deleteConversation(sessionId) {
            if (!confirm('Delete this chat?')) return;
            try {
                await callTool('chat_session_delete', { sessionId });
                if (currentSessionId === sessionId) {
                    currentSessionId = null;
                    localStorage.removeItem(STORAGE_KEY_CONV);
                    messagesContainer.innerHTML = '';
                    messagesContainer.style.display = 'none';
                    emptyState.classList.remove('hidden');
                }
                await loadConversations();
            } catch (err) {
                console.error('deleteConversation:', err);
                showError(`Failed to delete: ${err.message}`);
            }
        }

        // ── New chat ──────────────────────────────────────────────────────────────
        function startNewChat() {
            currentSessionId = null;
            localStorage.removeItem(STORAGE_KEY_CONV);
            messagesContainer.innerHTML = '';
            messagesContainer.style.display = 'none';
            emptyState.classList.remove('hidden');
            hideError();
            closeSidebar();
            loadConversations();
            messageInput.focus();
        }

        // ── Send message ──────────────────────────────────────────────────────────
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isBusy) return;

            isBusy = true;
            messageInput.disabled = true;
            sendBtn.disabled = true;
            hideError();

            emptyState.classList.add('hidden');
            messagesContainer.style.display = 'flex';
            appendMessage('user', message, false);
            messageInput.value = '';

            document.getElementById('thinking-indicator').style.display = 'flex';
            scrollToBottom();

            try {
                // Create session on first message
                if (!currentSessionId) {
                    const created = await callTool('chat_session_create', {
                        title: message.slice(0, 60),
                        model: 'claude-sonnet-4-6'
                    });
                    currentSessionId = created.sessionId;
                    localStorage.setItem(STORAGE_KEY_CONV, currentSessionId);
                }

                // Send message — full response returned (not streamed)
                const result = await callTool('chat_message_send', {
                    sessionId: currentSessionId,
                    content: message
                });

                document.getElementById('thinking-indicator').style.display = 'none';
                appendMessage('assistant', result.content, false);
                scrollToBottom();

                // Refresh sidebar list
                await loadConversations();

            } catch (err) {
                console.error('sendMessage:', err);
                document.getElementById('thinking-indicator').style.display = 'none';
                showError(`Error: ${err.message}`);
            } finally {
                isBusy = false;
                messageInput.disabled = false;
                sendBtn.disabled = !messageInput.value.trim();
                messageInput.focus();
            }
        }

        // ── Message rendering ─────────────────────────────────────────────────────
        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? 'U' : 'C';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = formatMarkdown(String(content ?? ''));

            div.appendChild(avatar);
            div.appendChild(bubble);
            messagesContainer.appendChild(div);
            return div;
        }

        // ── Markdown renderer ─────────────────────────────────────────────────────
        function formatMarkdown(text) {
            // Process block-by-block to avoid regex collisions
            const blocks = [];
            let remaining = text;

            // 1. Protect fenced code blocks
            remaining = remaining.replace(/```[\w]*\n([\s\S]*?)```/g, (_, code) => {
                const idx = blocks.length;
                blocks.push(`<pre><code>${escapeHtml(code.trim())}</code></pre>`);
                return `\x00BLOCK${idx}\x00`;
            });

            // 2. Tables — detect pipe-row blocks
            remaining = remaining.replace(
                /((?:\|.+\|\n?)+)/g,
                (match) => {
                    const lines = match.trim().split('\n').filter(l => l.trim());
                    // Need at least header + separator + one data row
                    if (lines.length < 2) return match;
                    const isSep = l => /^\|[\s|:-]+\|$/.test(l.trim());
                    // Find separator row
                    let sepIdx = lines.findIndex(isSep);
                    if (sepIdx < 1) return match;

                    const parseRow = (l) =>
                        l.trim().replace(/^\||\|$/g, '').split('|').map(c => c.trim());

                    const headers = parseRow(lines[0]);
                    const dataRows = lines.slice(sepIdx + 1);

                    // Skip pure separator-only tables
                    if (!dataRows.length) return match;

                    const thead = `<tr>${headers.map(h => `<th>${inlineMarkdown(h)}</th>`).join('')}</tr>`;
                    const tbody = dataRows.map(row => {
                        const cells = parseRow(row);
                        return `<tr>${cells.map(c => `<td>${inlineMarkdown(c)}</td>`).join('')}</tr>`;
                    }).join('');

                    const idx = blocks.length;
                    blocks.push(`<table><thead>${thead}</thead><tbody>${tbody}</tbody></table>`);
                    return `\x00BLOCK${idx}\x00`;
                }
            );

            // 3. Horizontal rules (--- or *** on their own line) — suppress entirely
            remaining = remaining.replace(/^[ \t]*[-*]{3,}[ \t]*$/gm, '');

            // 4. Headings
            remaining = remaining.replace(/^### (.+)$/gm, (_, t) => { const i = blocks.length; blocks.push(`<h3>${inlineMarkdown(t)}</h3>`); return `\x00BLOCK${i}\x00`; });
            remaining = remaining.replace(/^## (.+)$/gm,  (_, t) => { const i = blocks.length; blocks.push(`<h2>${inlineMarkdown(t)}</h2>`); return `\x00BLOCK${i}\x00`; });
            remaining = remaining.replace(/^# (.+)$/gm,   (_, t) => { const i = blocks.length; blocks.push(`<h1>${inlineMarkdown(t)}</h1>`); return `\x00BLOCK${i}\x00`; });

            // 5. Lists — group consecutive list items into <ul>
            remaining = remaining.replace(/((?:^[-*] .+\n?)+)/gm, (match) => {
                const items = match.trim().split('\n')
                    .filter(l => /^[-*] /.test(l))
                    .map(l => `<li>${inlineMarkdown(l.replace(/^[-*] /, ''))}</li>`)
                    .join('');
                const i = blocks.length;
                blocks.push(`<ul>${items}</ul>`);
                return `\x00BLOCK${i}\x00`;
            });

            // 6. Inline formatting on remaining text, then line breaks
            remaining = remaining
                .split('\n')
                .map(line => line.startsWith('\x00BLOCK') ? line : inlineMarkdown(line))
                .join('\n');

            // Collapse 3+ blank lines to 2, convert \n\n to paragraph break, \n to <br>
            remaining = remaining
                .replace(/\n{3,}/g, '\n\n')
                .replace(/\n\n/g, '<br><br>')
                .replace(/\n/g, '<br>');

            // Final pass: strip any remaining literal --- or *** lines (e.g. after <br> tags)
            remaining = remaining.replace(/(<br>)*[ \t]*[-*]{3,}[ \t]*(<br>)*/g, '');

            // 7. Restore protected blocks (unwrap <br> padding around blocks)
            remaining = remaining.replace(/(<br>)*\x00BLOCK(\d+)\x00(<br>)*/g, (_, pre, idx, post) => {
                return (pre ? '<br>' : '') + blocks[+idx] + (post ? '<br>' : '');
            });

            return remaining;
        }

        // Inline-only markdown (bold, italic, inline code, no block elements)
        function inlineMarkdown(text) {
            return text
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>');
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        // ── Error banner ──────────────────────────────────────────────────────────
        function showError(msg) {
            errorBanner.textContent = msg;
            errorBanner.classList.add('show');
        }

        function hideError() {
            errorBanner.classList.remove('show');
        }

        // ── Utilities ─────────────────────────────────────────────────────────────
        function formatTime(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            const now = new Date();
            const diff = now - d;
            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
            return `${Math.floor(diff / 86400000)}d ago`;
        }

        function scrollToBottom() {
            const el = document.getElementById('chatMessages');
            el.scrollTop = el.scrollHeight;
        }

        // ── Boot ──────────────────────────────────────────────────────────────────
        init();
    </script>
</body>
</html>
